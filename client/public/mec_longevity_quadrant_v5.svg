<svg width="100%" viewBox="0 0 680 460" role="img"
     xmlns="http://www.w3.org/2000/svg">
  <title>MEC Longevity Framework — Four Boxes</title>
  <desc>Four-pillar framework as a 2x2 grid of enlarged cards.</desc>
  <!-- TOP-LEFT: Healthspan -->
  <rect x="20" y="20" width="310" height="200" rx="6"
        fill="#0d2340" stroke="#c9a84c" stroke-width="0.8"/>
  <rect x="20" y="20" width="310" height="5" rx="3"
        fill="#c9a84c" opacity="0.85"/>
  <text x="46" y="60" font-family="Georgia, serif" font-size="20"
        fill="#c9a84c" font-weight="700">Healthspan</text>
  <text x="46" y="84" font-family="Georgia, serif" font-size="13"
        fill="#4a8fc4" font-style="italic">not just lifespan</text>
  <line x1="46" y1="97" x2="314" y2="97"
        stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
  <text x="46" y="122" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">We measure success in peak</text>
  <text x="46" y="142" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">performance years — the years</text>
  <text x="46" y="162" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">you're sharp, strong, and</text>
  <text x="46" y="182" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">fully in the game.</text>
  <!-- TOP-RIGHT: Biomarkers -->
  <rect x="350" y="20" width="310" height="200" rx="6"
        fill="#0d2340" stroke="#c9a84c" stroke-width="0.8"/>
  <rect x="350" y="20" width="310" height="5" rx="3"
        fill="#c9a84c" opacity="0.85"/>
  <text x="376" y="60" font-family="Georgia, serif" font-size="20"
        fill="#c9a84c" font-weight="700">Biomarkers</text>
  <text x="376" y="84" font-family="Georgia, serif" font-size="13"
        fill="#4a8fc4" font-style="italic">driven precision</text>
  <line x1="376" y1="97" x2="644" y2="97"
        stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
  <text x="376" y="122" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">Every protocol is built from</text>
  <text x="376" y="142" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">your blood, not a template.</text>
  <text x="376" y="162" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">Your biology dictates</text>
  <text x="376" y="182" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">the plan.</text>
  <!-- BOTTOM-LEFT: 3 Pillars -->
  <rect x="20" y="240" width="310" height="200" rx="6"
        fill="#0d2340" stroke="#4a8fc4" stroke-width="0.8"/>
  <rect x="20" y="240" width="310" height="5" rx="3"
        fill="#4a8fc4" opacity="0.85"/>
  <text x="46" y="280" font-family="Georgia, serif" font-size="20"
        fill="#4a8fc4" font-weight="700">3 Pillars</text>
  <text x="46" y="304" font-family="Georgia, serif" font-size="13"
        fill="#c9a84c" font-style="italic">longevity framework</text>
  <line x1="46" y1="317" x2="314" y2="317"
        stroke="#4a8fc4" stroke-width="0.5" opacity="0.4"/>
  <text x="46" y="342" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">Metabolic, performance, and</text>
  <text x="46" y="362" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">cellular optimization —</text>
  <text x="46" y="382" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">three systems, one</text>
  <text x="46" y="402" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">unified protocol.</text>
  <!-- BOTTOM-RIGHT: Quarterly -->
  <rect x="350" y="240" width="310" height="200" rx="6"
        fill="#0d2340" stroke="#4a8fc4" stroke-width="0.8"/>
  <rect x="350" y="240" width="310" height="5" rx="3"
        fill="#4a8fc4" opacity="0.85"/>
  <text x="376" y="280" font-family="Georgia, serif" font-size="20"
        fill="#4a8fc4" font-weight="700">Quarterly</text>
  <text x="376" y="304" font-family="Georgia, serif" font-size="13"
        fill="#c9a84c" font-style="italic">recalibration</text>
  <line x1="376" y1="317" x2="644" y2="317"
        stroke="#4a8fc4" stroke-width="0.5" opacity="0.4"/>
  <text x="376" y="342" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">Your program evolves as your</text>
  <text x="376" y="362" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">biomarkers improve. We stay</text>
  <text x="376" y="382" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">ahead of your biology,</text>
  <text x="376" y="402" font-family="Arial, sans-serif"
        font-size="13" fill="#a0b8cc">not behind it.</text>
</svg>
