name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build
        env:
          NODE_ENV: production
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_META_PIXEL_ID: ${{ secrets.VITE_META_PIXEL_ID }}
          VITE_APP_TITLE: "Miami Elite Coaching"
          VITE_APP_LOGO: "https://files.manuscdn.com/user_upload_by_module/web_dev_logo/310519663459681691/NhTTTaVhENyzkLwA.png"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -euo pipefail
            cd /var/www/miamielitecoaching
            echo "=== Resetting any local changes (workflow, lockfile, etc.) ==="
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            echo "=== HEAD now at: ==="
            git log --oneline -1
            echo "=== Installing dependencies ==="
            pnpm install
            echo "=== Building project ==="
            pnpm build
            echo "=== Restarting PM2 ==="
            pm2 restart miamielitecoaching --update-env
            pm2 save
            echo "Deploy complete at $(date)"
